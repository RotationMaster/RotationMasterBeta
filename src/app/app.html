<!-- PatchNotes Component   -->
<rm-patch-notes
  [patchNotes]="patchNotes"
  [visible]="patchNotesVisible"
  (close)="hidePatchNotes()">
</rm-patch-notes>

<div id="output"></div>

<div class="nismainborder fullscreen" [class.preview-only-mode]="getSettingValue('previewOnly')">
  <!-- Exit Preview Button - Only shown in preview mode -->
  @if (getSettingValue('previewOnly')) {
    <button 
      class="exit-preview-btn" 
      (click)="exitPreviewMode()"
      title="Exit Preview Mode">
      ✕
    </button>
  }
  
  <div id="rotationMaster">
    <!-- Header Section - Hidden in preview mode -->
    @if (!getSettingValue('previewOnly')) {
      <div class="mainHeader">
        <img src="./assets/icon.png" alt="Fox" class="fox-image" id="fox-image">
        <h1 id="Title">ROTATION MASTER</h1>
        <img src="./assets/icon.png" alt="Fox" class="fox-image" id="fox-image">
      </div>
    }

    <!-- Rotation Set Component -->
    <rm-rotation-set
      [abilitiesPerRow]="getSettingValue('abilitiesPerRow')"
      [selectedRotationIndex]="selectedIndex"
      [previewOnly]="getSettingValue('previewOnly')"
      (changeSelectedRotation)="onChangeSelectedRotation($event)"
      (rotationSetChange)="onSelectedRotationSetChange($event)"
    ></rm-rotation-set>

    <!-- Everything below hidden in preview mode -->
    @if (!getSettingValue('previewOnly')) {
      <hr style="margin: 20px 0; border: 1px solid #ccc" />

      <!-- Settings Component -->
      <rm-settings
        [version]="version()"
        [rangeSettings]="rangeSettings()"
        [boolSettings]="boolSettings()"
        (updateSetting)="onUpdateSetting($event)"
        (setOverlayPosition)="updateOverlayPosition()"
      ></rm-settings>

      <!-- DEBUG: latest chat line -->
      <!-- <div style="margin: 8px 0;">
        <label style="font-size:12px; opacity:0.7;">DEBUG — last chat line:</label>
        <input type="text" class="nisinput" readonly [value]="currentChatLine ?? '(none)'" style="width:100%; font-size:12px;" />
      </div> -->

      <!-- Patch Notes Button -->
      <button
        id="showPatchNotesButton"
        class="nisbutton"
        (click)="showPatchNotes(true)"
      >
        Show Patch Notes
      </button>
       
      <div id="ToggleOverlayButton" style="display:none !important;">🖼️</div>

      <!-- Footer Section -->
      <hr style="margin: 20px 0; border: 1px solid #ccc" />

      <div class="footer">
        <a href="https://patreon.com/IMEllamental?utm_medium=unknown&utm_source=join_link&utm_campaign=creatorshare_creator&utm_content=copyLink"
          target="_blank"
          rel="noopener noreferrer"
          class="subtle-link">
          <i class="fab fa-patreon"></i> Support on Patreon
        </a>
        <a href="https://discord.gg/3N6F3rppTC"
          target="_blank"
          rel="noopener noreferrer"
          class="subtle-link">
          <i class="fab fa-discord"></i> Join us on Discord
        </a>
      </div>
    }

    <div id="OverlayCanvasOutput">
      <canvas willReadFrequently="true" width="4000" height="4000"></canvas>
    </div>
  </div>
</div>
